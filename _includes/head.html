<head>

    <!-- Metas -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="keywords" content="{{ site.description }}">
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="Félix Moulin">
    {%- seo -%}
    <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/favicons/android-chrome-192x192.png' | relative_url }}">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Mode "Standalone" pour iOS -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="{{ site.title }}">
    <!-- Title  -->
    <title>{{ site.title }}</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ 'assets/images/favicons/favicon.ico' | relative_url }}" />

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">

    <!-- Font -->
    <link rel="stylesheet" href="{{ 'assets/css/satoshi.css' | relative_url }}" />

    <!-- Plugins -->
    <link rel="stylesheet" href="{{ 'assets/css/plugins.css' | relative_url }}" />

    <!-- Core Style Css -->
    <link rel="stylesheet" href="{{ 'assets/css/style.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ 'assets/css/country-flag.css' | relative_url }}">
    <link rel="stylesheet" href="{{ 'assets/css/submenu.css' | relative_url }}">

    <!-- Monochrome Velo — Design System -->
    <link rel="stylesheet" href="{{ 'assets/css/velo-design.css' | relative_url }}">
    <script src="{{ 'assets/js/country-flag.js' | relative_url }}"></script>

    <script src="{{ 'assets/js/simple-jekyll-search.js' | relative_url }}"></script>

    <script src="{{ 'assets/js/init.js' | relative_url }}" defer></script>



<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "ba4ad904-0c3d-4eb9-b7f6-35f6a36c1893",
    });
  });
</script>
</head>
