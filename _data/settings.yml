# Theme Settings Configuration File
##
### use settings.yml file for configure colors, ui, rtl, sidebar, animation options

### Main Settings
settings:
  skin: "light" # select initial skin option: "light" or "dark"

### Team Identity
team:
  name: "TEAM SPECIALIZED LILLE"
  short_name: "Team Specialized Lille"
  founded: "EST. 2022"
  location: "Lille, FR"
  disciplines: "ROUTE · CX · VTT"
  roster_size: "18 COUREURS"
  baseline: "Route, CX & VTT"
  facebook: "https://www.facebook.com/cycleslecolier"
  strava: ""
  instagram: ""

### Header
header:
  logo:
    image: "assets/img/profil.png"
    alt: "Team Specialized Lille"

### Social
social:
  - title: "Facebook"
    icon: "fab fa-facebook"
    url: "https://www.facebook.com/cycleslecolier"

### Footer
footer:
  developer: "Developed by <strong>Félix</strong>"
  copyright: "<strong>Félix MOULIN</strong>. All rights reserved"

### Portfolio Filters Settings
portfolio:
  layout: "list"
  filters:
    - name: "Route"
      slug: "road"
    - name: "Cyclo cross"
      slug: "cx"
    - name: "VTT"
      slug: "vtt"

### Partners (displayed on homepage)
