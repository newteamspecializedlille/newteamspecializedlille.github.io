name: Upload Photos

on:
  repository_dispatch:
    types: [upload_photos]

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  upload_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Afficher les données reçues
        run: |
          echo "Photographe : ${{ github.event.client_payload.photographer_name }}"
          echo "Post URL    : ${{ github.event.client_payload.post_url }}"
          echo "Images raw  : ${{ github.event.client_payload.images_urls }}"

      - name: Exécuter le script d'upload
        env:
          PHOTOGRAPHER_NAME: ${{ github.event.client_payload.photographer_name }}
          POST_URL: ${{ github.event.client_payload.post_url }}
          IMAGES_URLS: ${{ toJson(github.event.client_payload.images_urls) }}
        run: python3 python_scripts/upload_photos.py

      - name: Commit et push sur main
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add photos from ${{ github.event.client_payload.photographer_name }}"
          file_pattern: "assets/results/ _posts/"

      - name: Setup Ruby
        if: steps.commit.outputs.changes_detected == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Pages
        if: steps.commit.outputs.changes_detected == 'true'
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        if: steps.commit.outputs.changes_detected == 'true'
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        if: steps.commit.outputs.changes_detected == 'true'
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changes_detected == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
